# Redirect HTTP non-www to HTTPS www
server {
    listen 80;
    server_name carinjurylaw.com www.carinjurylaw.com;
    return 301 https://www.carinjurylaw.com$request_uri;
}

# Redirect HTTPS non-www to HTTPS www
server {
    listen 443 ssl;
    server_name carinjurylaw.com;

    ssl_certificate /etc/ssl/certs/carinjurylaw.crt;
    ssl_certificate_key /etc/ssl/private/carinjurylaw.key;

    return 301 https://www.carinjurylaw.com$request_uri;
}

# Main HTTPS www server — all traffic lands here
server {
    listen 443 ssl;
    server_name www.carinjurylaw.com;

    ssl_certificate /etc/ssl/certs/carinjurylaw.crt;
    ssl_certificate_key /etc/ssl/private/carinjurylaw.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — all important types included
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/html
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/xml
        image/svg+xml
        font/woff
        font/woff2
        font/ttf;
    gzip_disable "MSIE [1-6]\.";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets directly via Nginx
    location ~* \.(?:css|js|jpg|svg|woff2?|ttf|png|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Allow robots.txt and sitemap.xml directly
    location = /robots.txt {
        proxy_pass http://api:5000;
        proxy_set_header Host $host;
    }

    location = /sitemap.xml {
        proxy_pass http://api:5000;
        proxy_set_header Host $host;
    }

    # Proxy everything else to Node.js
    # Node handles trailing slash and meta injection
    location / {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For 
            $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}